name: Refresh Jadwal Cache

on:
  # Jalankan manual dari tab Actions
  workflow_dispatch:

  # Otomatis setiap awal semester (Februari dan Agustus, tiap Senin pertama)
  schedule:
    - cron: '0 0 1-7 2 1'   # Senin pertama Februari, 07.00 WIB
    - cron: '0 0 1-7 8 1'   # Senin pertama Agustus, 07.00 WIB

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout repo
        uses: actions/checkout@v4

      - name: 2. Setup Chrome
        uses: browser-actions/setup-chrome@latest

      - name: 3. Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 4. Install dependencies
        run: pip install selenium ddddocr python-dotenv

      - name: 5. Jalankan refresh_jadwal.py
        env:
          NPM: ${{ secrets.NPM }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: python -u refresh_jadwal.py

      - name: 6. Commit jadwal_cache.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jadwal_cache.json
          git diff --cached --quiet || git commit -m "chore: refresh jadwal cache [skip ci]"
          git push